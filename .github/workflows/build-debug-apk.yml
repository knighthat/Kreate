name: Build Debug APK

on:
  push:
    branches:
      - fix/api24-desugaring
  workflow_dispatch:

concurrency:
  group: debug-apk
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleGithubUniversalProdDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kreate-debug
          path: composeApp/build/outputs/apk/githubUniversalProd/debug/Kreate-debug.apk
          if-no-files-found: warn
